<div *ngIf="notification()"
     class="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] w-full max-w-md px-4 animate-slide-down">
  <div class="relative group bg-inverse-surface/80 backdrop-blur-xl border border-[#D4A843]/30 rounded-2xl p-4 shadow-[0_20px_50px_rgba(0,0,0,0.5)] overflow-hidden">
    <!-- Glow Effect -->
    <div class="absolute -inset-1 bg-gradient-to-r from-[#D4A843]/0 via-[#D4A843]/20 to-[#D4A843]/0 group-hover:via-[#D4A843]/40 transition-all duration-1000 blur-xl opacity-50"></div>
    
    <div class="relative flex items-center gap-4">
      <!-- Icon -->
      <div [ngClass]="{
        'bg-green-500/20 text-green-400': notification()?.type === 'success',
        'bg-red-500/20 text-red-400': notification()?.type === 'error',
        'bg-[#D4A843]/20 text-[#D4A843]': notification()?.type === 'info',
        'bg-orange-500/20 text-orange-400': notification()?.type === 'warning'
      }" class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 border border-white/5">
        <span class="material-symbols-outlined text-2xl">
          {{ notification()?.type === 'success' ? 'check_circle' : 
             notification()?.type === 'error' ? 'error' : 
             notification()?.type === 'warning' ? 'warning' : 'info' }}
        </span>
      </div>

      <!-- Content -->
      <div class="flex-1">
        <h4 class="text-white font-bold text-sm leading-tight uppercase tracking-widest opacity-60 mb-0.5">
          {{ notification()?.type }}
        </h4>
        <p class="text-white/90 text-sm font-medium">
          {{ notification()?.message }}
        </p>
      </div>

      <!-- Close -->
      <button (click)="dismiss()" class="text-white/30 hover:text-white transition-colors">
        <span class="material-symbols-outlined text-xl">close</span>
      </button>
    </div>

    <!-- Progress Bar -->
    <div class="absolute bottom-0 left-0 h-0.5 bg-[#D4A843] animate-progress"
         [style.animationDuration.ms]="notification()?.duration || 5000"></div>
  </div>
</div>
