<section class="section-padding bg-surface-container-lowest relative overflow-hidden">
  <!-- Decorative background elements -->
  <div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-5">
    <div class="absolute -top-24 -left-24 w-96 h-96 bg-[#E53935] rounded-full blur-[120px]"></div>
    <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-[#E53935] rounded-full blur-[120px]"></div>
  </div>

  <div class="max-w-7xl mx-auto px-6 md:px-12 relative z-10">
    <!-- Section Header -->
    <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
      <div class="max-w-2xl">
        <div class="inline-flex items-center gap-2 bg-[#E53935]/5 px-4 py-1.5 rounded-sm mb-6">
          <span class="material-symbols-outlined text-[#E53935] text-sm">article</span>
          <span class="text-[#E53935] font-label text-xs font-bold tracking-widest uppercase">{{ t().blog_section.tag }}</span>
        </div>
        <h2 class="text-4xl md:text-6xl font-black text-on-surface leading-[0.9] tracking-tighter">
          {{ t().blog_section.title }} <span class="text-[#E53935] italic">{{ t().blog_section.title_accent }}</span>
        </h2>
        <p class="text-on-surface-variant text-lg mt-8 leading-relaxed font-label max-w-xl">
          {{ t().blog_section.desc }}
        </p>
      </div>
      <button class="flex items-center gap-2 text-[#E53935] font-label font-bold text-sm group">
        {{ t().blog_section.cta }}
        <span class="material-symbols-outlined text-base group-hover:translate-x-1 transition-transform">arrow_forward</span>
      </button>
    </div>

    <!-- Blog Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div *ngFor="let blog of blogs()" 
           class="group bg-white rounded-[32px] overflow-hidden border border-outline-variant/10 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-700 flex flex-col h-full">
        <a [routerLink]="['/blog', blog.slug || blog.id]" class="block flex-1 flex flex-col">
          <!-- Image -->
          <div class="aspect-[16/10] overflow-hidden relative">
            <img [src]="blog.image" [alt]="blog.title" 
                 class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
            <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
          </div>

          <!-- Content -->
          <div class="p-8 flex flex-col flex-1">
            <div class="flex items-center gap-4 mb-4 text-xs font-label text-on-surface-variant/60 font-bold tracking-wide">
              <span class="flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">calendar_today</span>
                {{ blog.date }}
              </span>
              <span class="flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">schedule</span>
                {{ blog.readTime }}
              </span>
            </div>

            <h3 class="text-2xl font-black mb-4 group-hover:text-[#E53935] transition-colors duration-300 leading-tight">
              {{ blog.title }}
            </h3>
            
            <p class="text-on-surface-variant text-sm leading-relaxed mb-8 line-clamp-3">
              {{ blog.excerpt }}
            </p>

            <div class="mt-auto">
              <span class="inline-flex items-center gap-2 font-label font-bold text-sm text-[#E53935] group/btn hover:gap-3 transition-all">
                Read Article
                <span class="material-symbols-outlined text-base group-hover/btn:translate-x-1 transition-transform">arrow_right_alt</span>
              </span>
            </div>
          </div>
        </a>
      </div>
    </div>
  </div>
</section>
