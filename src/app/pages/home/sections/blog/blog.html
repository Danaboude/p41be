<section class="section-padding bg-surface-container-lowest relative overflow-hidden">
  <!-- Decorative background elements -->
  <div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-5">
    <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary rounded-full blur-[120px]"></div>
    <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-primary rounded-full blur-[120px]"></div>
  </div>

  <div class="max-w-7xl mx-auto relative z-10">
    <!-- Section Header -->
    <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
      <div class="animate-slide-up">
        <div class="inline-flex items-center gap-2 bg-primary/10 px-4 py-1.5 rounded-sm mb-6">
          <span class="material-symbols-outlined text-primary text-sm">edit_note</span>
          <span class="text-primary font-label text-xs font-bold tracking-widest uppercase">Insights & Wisdom</span>
        </div>
        <h2 class="text-4xl md:text-5xl font-black mb-4">Our <span class="text-primary italic">Blog</span></h2>
        <p class="text-xl text-on-surface-variant font-label max-w-lg">Get weekly inspiration for free! Explore our latest thoughts on industrial excellence.</p>
      </div>
      
      <a routerLink="/blog" class="group flex items-center gap-2 text-primary font-bold font-label hover:gap-4 transition-all duration-300">
        View All Posts
        <span class="material-symbols-outlined">arrow_forward</span>
      </a>
    </div>

    <!-- Blog Posts Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div *ngFor="let blog of blogs; let i = index" 
           class="group bg-white rounded-3xl overflow-hidden border border-outline-variant/10 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 flex flex-col h-full animate-slide-up"
           [style.animation-delay]="i * 100 + 'ms'">
        
        <!-- Image Container -->
        <div class="relative aspect-[16/10] overflow-hidden">
          <img [src]="blog.image" [alt]="blog.title" 
               class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
          <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
          <div class="absolute top-4 left-4 bg-white/90 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest text-primary shadow-sm">
            Article
          </div>
        </div>

        <!-- Content -->
        <div class="p-8 flex flex-col flex-1">
          <div class="flex items-center gap-4 mb-4 text-xs font-label text-on-surface-variant/60 font-bold tracking-wide">
            <span class="flex items-center gap-1">
              <span class="material-symbols-outlined text-sm">calendar_today</span>
              {{ blog.date }}
            </span>
            <span class="flex items-center gap-1">
              <span class="material-symbols-outlined text-sm">schedule</span>
              {{ blog.readTime }}
            </span>
          </div>

          <h3 class="text-2xl font-black mb-4 group-hover:text-primary transition-colors duration-300 leading-tight">
            {{ blog.title }}
          </h3>
          
          <p class="text-on-surface-variant text-sm leading-relaxed mb-8 line-clamp-3">
            {{ blog.excerpt }}
          </p>

          <div class="mt-auto">
            <a [routerLink]="['/blog', blog.id]" 
               class="inline-flex items-center gap-2 font-label font-bold text-sm text-primary group/btn hover:gap-3 transition-all">
              Read More
              <span class="material-symbols-outlined text-base group-hover/btn:translate-x-1 transition-transform">arrow_right_alt</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
