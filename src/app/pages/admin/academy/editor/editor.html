<div class="min-h-screen bg-surface p-6 md:p-12 animate-fade-in">
  <div class="max-w-5xl mx-auto">
    <!-- Header -->
    <div class="flex items-center justify-between mb-12">
      <div>
        <a routerLink="/admin/academy" class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors mb-2 group">
          <span class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform">arrow_back</span>
          <span class="font-label text-xs font-bold uppercase tracking-widest">Back to Academy</span>
        </a>
        <h1 class="text-4xl font-black">{{ isEditMode ? 'Edit' : 'Create New' }} <span class="text-primary">Course</span></h1>
      </div>
      
      <div class="flex gap-4">
        <button (click)="save()" [disabled]="isSaving()" 
                class="bg-primary text-white font-label font-bold px-8 py-4 rounded-2xl flex items-center gap-2 hover:scale-105 active:scale-95 transition-all shadow-xl shadow-primary/20 disabled:opacity-50">
          <span class="material-symbols-outlined">{{ isEditMode ? 'save' : 'add' }}</span>
          {{ isSaving() ? 'Saving...' : (isEditMode ? 'Save Changes' : 'Publish Course') }}
        </button>
      </div>
    </div>

    <div *ngIf="isLoading()" class="py-20 text-center">
      <div class="inline-block w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
    </div>

    <!-- Form Sections -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8" *ngIf="!isLoading()">
      
      <!-- Left Column: Main Info -->
      <div class="lg:col-span-2 space-y-8">
        <!-- Basic Info Card -->
        <div class="bg-white rounded-[32px] p-8 border border-outline-variant/10 shadow-sm space-y-6">
          <h2 class="text-xl font-black mb-6 flex items-center gap-3">
            <span class="w-8 h-8 rounded-lg bg-primary/10 text-primary flex items-center justify-center">
              <span class="material-symbols-outlined text-sm">info</span>
            </span>
            Basic Information
          </h2>

          <div class="space-y-4">
            <div class="space-y-2">
              <label class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant/60 ml-1">Title</label>
              <input type="text" [(ngModel)]="courseForm.title" class="w-full px-5 py-4 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/20 transition-all font-bold" placeholder="Course Title">
            </div>

            <div class="space-y-2">
              <label class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant/60 ml-1">Subtitle</label>
              <input type="text" [(ngModel)]="courseForm.subtitle" class="w-full px-5 py-4 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/20 transition-all font-bold" placeholder="Short catchphrase">
            </div>

            <div class="space-y-2">
              <label class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant/60 ml-1">Short Description</label>
              <textarea [(ngModel)]="courseForm.description" rows="3" class="w-full px-5 py-4 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/20 transition-all font-medium" placeholder="Used in grid cards..."></textarea>
            </div>
          </div>
        </div>

        <!-- Detailed Content -->
        <div class="bg-white rounded-[32px] p-8 border border-outline-variant/10 shadow-sm space-y-6">
          <h2 class="text-xl font-black mb-6 flex items-center gap-3">
            <span class="w-8 h-8 rounded-lg bg-primary/10 text-primary flex items-center justify-center">
              <span class="material-symbols-outlined text-sm">subject</span>
            </span>
            Detailed Course Content
          </h2>

          <!-- Long Description Paragraphs -->
          <div class="space-y-4">
            <label class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant/60 ml-1">Long Description Paragraphs</label>
            <div class="space-y-3">
              <div *ngFor="let p of courseForm.longDescription; let i = index" class="flex gap-3 group">
                <div class="flex-1 p-4 bg-surface-container-low rounded-xl text-sm leading-relaxed border border-transparent group-hover:border-primary/20">
                  {{ p }}
                </div>
                <button (click)="removeLongDescPara(i)" class="text-on-surface-variant/40 hover:text-primary transition-colors">
                  <span class="material-symbols-outlined">delete</span>
                </button>
              </div>
            </div>
            <div class="flex gap-2">
              <input type="text" [(ngModel)]="newLongDescPara" (keyup.enter)="addLongDescPara()" class="flex-1 px-5 py-3 bg-surface-container-low rounded-xl outline-none focus:ring-2 focus:ring-primary/20 text-sm" placeholder="Add a paragraph...">
              <button (click)="addLongDescPara()" class="w-12 h-12 rounded-xl border-2 border-primary/20 text-primary hover:bg-primary/5 transition-all flex items-center justify-center">
                <span class="material-symbols-outlined">add</span>
              </button>
            </div>
          </div>

          <!-- Modules -->
          <div class="space-y-4 pt-4 border-t border-outline-variant/10">
            <label class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant/60 ml-1">Learning Modules</label>
            <div class="space-y-3">
              <div *ngFor="let m of courseForm.modules; let i = index" class="p-4 bg-surface-container-low rounded-2xl flex justify-between items-start group border border-transparent hover:border-primary/20 transition-all">
                <div>
                  <h4 class="font-bold text-sm text-primary mb-1">{{ m.title }}</h4>
                  <p class="text-[10px] text-on-surface-variant/60 font-label font-bold uppercase tracking-widest mb-2">{{ m.duration }}</p>
                  <p class="text-xs text-on-surface-variant leading-relaxed">{{ m.description }}</p>
                </div>
                <button (click)="removeModule(i)" class="text-on-surface-variant/40 hover:text-primary transition-colors">
                  <span class="material-symbols-outlined">delete</span>
                </button>
              </div>
            </div>
            
            <div class="p-6 bg-surface-container-lowest rounded-[24px] border border-outline-variant/10 space-y-4">
              <input type="text" [(ngModel)]="newModule.title" class="w-full px-4 py-3 bg-white rounded-xl outline-none border border-outline-variant/20 focus:border-primary transition-all text-sm font-bold" placeholder="Module Title">
              <input type="text" [(ngModel)]="newModule.duration" class="w-full px-4 py-3 bg-white rounded-xl outline-none border border-outline-variant/20 focus:border-primary transition-all text-sm" placeholder="Duration (e.g. 45 min)">
              <textarea [(ngModel)]="newModule.description" class="w-full px-4 py-3 bg-white rounded-xl outline-none border border-outline-variant/20 focus:border-primary transition-all text-sm" placeholder="Module Description..."></textarea>
              <button (click)="addModule()" class="w-full py-3 bg-primary/10 text-primary font-bold text-xs uppercase tracking-widest rounded-xl hover:bg-primary hover:text-white transition-all">Add Module</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Column: Settings & Metadata -->
      <div class="space-y-8">
        
        <!-- Image & Price Card -->
        <div class="bg-white rounded-[32px] p-8 border border-outline-variant/10 shadow-sm space-y-8">
          <!-- Featured Image -->
          <div class="space-y-4">
            <label class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant/60 ml-1">Featured Artwork</label>
            <div class="aspect-video rounded-2xl overflow-hidden bg-surface-container-low border border-outline-variant/10 relative group/img">
              <img *ngIf="courseForm.image" [src]="courseForm.image" class="w-full h-full object-cover">
              <div *ngIf="!courseForm.image" class="w-full h-full flex items-center justify-center text-on-surface-variant/20 italic">
                <span class="material-symbols-outlined text-4xl">image</span>
              </div>
              <div *ngIf="isUploadingImg" class="absolute inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center">
                <div class="w-8 h-8 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
              </div>
              <input type="file" (change)="onFileSelected($event)" #fileInput class="hidden">
              <button (click)="fileInput.click()" class="absolute inset-0 bg-primary/20 opacity-0 group-hover/img:opacity-100 transition-opacity flex items-center justify-center">
                <span class="bg-white text-primary px-4 py-2 rounded-full font-bold text-xs">Update Image</span>
              </button>
            </div>
          </div>

          <!-- Pricing -->
          <div class="space-y-4 pt-6 border-t border-outline-variant/10">
            <div class="flex items-center justify-between">
              <label class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant/60 ml-1">Course Type</label>
              <div class="flex items-center gap-2">
                <span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/40">Free</span>
                <button (click)="courseForm.isPaid = !courseForm.isPaid" class="w-10 h-6 rounded-full relative transition-all" [class.bg-primary]="courseForm.isPaid" [class.bg-outline-variant/20]="!courseForm.isPaid">
                  <div class="w-4 h-4 bg-white rounded-full absolute top-1 transition-all" [class.right-1]="courseForm.isPaid" [class.left-1]="!courseForm.isPaid"></div>
                </button>
                <span class="text-[10px] font-bold uppercase tracking-widest text-primary">Paid</span>
              </div>
            </div>

            <div class="space-y-2">
              <label class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant/60 ml-1">Price Label</label>
              <input type="text" [(ngModel)]="courseForm.price" class="w-full px-5 py-4 bg-surface-container-low rounded-2xl outline-none focus:ring-2 focus:ring-primary/20 transition-all font-black" placeholder="e.g. €1,490">
            </div>
          </div>
        </div>

        <!-- Meta Stats -->
        <div class="bg-white rounded-[32px] p-8 border border-outline-variant/10 shadow-sm space-y-6">
          <h2 class="text-sm font-black uppercase tracking-widest text-on-surface-variant">Course Details</h2>
          
          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="text-[10px] font-black tracking-widest text-on-surface-variant/40 ml-1">DURATION</label>
              <input type="text" [(ngModel)]="courseForm.duration" class="w-full px-4 py-3 bg-surface-container-low rounded-xl outline-none text-xs font-bold" placeholder="8 weeks">
            </div>
            <div class="space-y-2">
              <label class="text-[10px] font-black tracking-widest text-on-surface-variant/40 ml-1">LEVEL</label>
              <select [(ngModel)]="courseForm.level" class="w-full px-4 py-3 bg-surface-container-low rounded-xl outline-none text-xs font-bold appearance-none">
                <option>Beginner</option>
                <option>Intermediate</option>
                <option>Advanced</option>
                <option>Expert</option>
              </select>
            </div>
          </div>

          <!-- Tags -->
          <div class="space-y-3 pt-4 border-t border-outline-variant/10">
            <label class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant/60 ml-1">Tags</label>
            <div class="flex flex-wrap gap-2">
              <span *ngFor="let t of courseForm.tags; let i = index" class="px-3 py-1 bg-surface-container-low rounded-full text-[10px] font-bold text-primary flex items-center gap-2">
                {{ t }}
                <button (click)="removeTag(i)" class="material-symbols-outlined text-xs hover:text-red-500">close</button>
              </span>
            </div>
            <div class="flex gap-2">
              <input type="text" [(ngModel)]="newTag" (keyup.enter)="addTag()" class="flex-1 px-4 py-2 bg-surface-container-low rounded-lg outline-none text-xs" placeholder="Add tag...">
              <button (click)="addTag()" class="text-primary hover:bg-primary/5 p-2 rounded-lg">
                <span class="material-symbols-outlined text-sm">add_circle</span>
              </button>
            </div>
          </div>
        </div>

        <!-- Outcomes & Prerequisites -->
        <div class="bg-white rounded-[32px] p-8 border border-outline-variant/10 shadow-sm space-y-6">
          <div class="space-y-4">
            <label class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant/60 ml-1">Learning Outcomes</label>
            <div class="space-y-2">
              <div *ngFor="let o of courseForm.whatYouLearn; let i = index" class="flex items-start gap-2 group">
                <span class="material-symbols-outlined text-[#D4A843] text-sm mt-0.5">check_circle</span>
                <span class="text-xs text-on-surface-variant flex-1 leading-relaxed">{{ o }}</span>
                <button (click)="removeOutcome(i)" class="opacity-0 group-hover:opacity-100 transition-opacity text-on-surface-variant/40">
                  <span class="material-symbols-outlined text-xs">delete</span>
                </button>
              </div>
            </div>
            <div class="flex gap-2">
              <input type="text" [(ngModel)]="newOutcome" (keyup.enter)="addOutcome()" class="flex-1 px-4 py-2 bg-surface-container-low rounded-lg outline-none text-xs" placeholder="What will they learn?">
              <button (click)="addOutcome()" class="text-primary p-2">
                <span class="material-symbols-outlined text-sm">add</span>
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
