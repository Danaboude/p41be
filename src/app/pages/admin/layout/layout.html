<div class="min-h-screen bg-surface-container-lowest flex">
  <!-- Sidebar -->
  <aside 
    [class]="'fixed inset-y-0 left-0 z-50 w-72 bg-white border-r border-outline-variant/5 shadow-[20px_0_50px_rgba(33,85,157,0.03)] transition-transform duration-300 transform lg:translate-x-0 ' + (isSidebarOpen() ? 'translate-x-0' : '-translate-x-full')">
    
    <!-- Sidebar Header -->
    <div class="p-8 flex items-center gap-3">
      <div class="bg-primary/5 p-2 rounded-xl border border-primary/10">
        <img src="logo.jpg" alt="P41 Logo" class="h-8 w-auto">
      </div>
      <div>
        <h2 class="font-black tracking-tight text-on-surface text-lg leading-none">P41 <span class="text-primary">Admin</span></h2>
        <p class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant/40 mt-1">Intelligence</p>
      </div>
    </div>

    <!-- Navigation Menu -->
    <nav class="mt-4 px-4 space-y-2">
      <a *ngFor="let item of menuItems" 
         [routerLink]="item.route"
         (click)="isSidebarOpen() && toggleSidebar()"
         [class]="'flex items-center gap-4 px-4 py-4 rounded-2xl transition-all group ' + 
         (isRouteActive(item.route) ? 'bg-primary text-white shadow-lg shadow-primary/20' : 'text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface')">
        <span class="material-symbols-outlined text-[22px] group-hover:scale-110 transition-transform">
          {{ item.icon }}
        </span>
        <span class="font-bold text-sm tracking-wide">{{ item.name }}</span>
      </a>
    </nav>

    <!-- Sidebar Footer -->
    <div class="absolute bottom-6 left-4 right-4">
      <div class="bg-surface-container-low rounded-3xl p-4 flex items-center gap-4 border border-outline-variant/10">
        <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold text-xs shrink-0">
          {{ authService.currentUser()?.email?.charAt(0)?.toUpperCase() }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-xs font-bold text-on-surface truncate">{{ authService.currentUser()?.email }}</p>
          <p class="text-[10px] text-on-surface-variant/50 font-label">Administrator</p>
        </div>
        <button (click)="logout()" class="text-on-surface-variant/40 hover:text-error transition-colors">
          <span class="material-symbols-outlined text-xl">logout</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- Mobile Overlay -->
  <div *ngIf="isSidebarOpen()" 
       (click)="toggleSidebar()"
       class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 lg:hidden animate-fade-in">
  </div>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col lg:pl-72 min-h-screen">
    <!-- Topbar (Mobile Only) / Header -->
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-30 border-b border-outline-variant/10 h-20 flex items-center px-6 justify-between lg:px-10">
      <div class="flex items-center gap-4">
        <button (click)="toggleSidebar()" class="lg:hidden text-on-surface-variant hover:text-primary transition-colors">
          <span class="material-symbols-outlined text-2xl">menu</span>
        </button>
        <h1 class="font-black text-xl tracking-tight text-on-surface">
          Dashboard <span class="text-on-surface-variant/20 inline-block px-2">/</span>
          <span class="text-on-surface-variant font-medium text-lg">Control Center</span>
        </h1>
      </div>

      <div class="flex items-center gap-4">
        <div class="hidden md:flex flex-col text-right">
          <p class="text-xs font-bold text-on-surface">{{ authService.currentUser()?.email }}</p>
          <p class="text-[10px] text-primary font-bold uppercase tracking-widest">Active Session</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center border border-outline-variant/10">
          <span class="material-symbols-outlined text-on-surface-variant text-xl">notifications</span>
        </div>
      </div>
    </header>

    <!-- Main View -->
    <main class="flex-1 p-6 lg:p-10 animate-fade-in">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
