<main class="min-h-screen bg-surface-container-lowest flex items-center justify-center p-6 relative overflow-hidden">
  <!-- Decorative background -->
  <div class="absolute inset-0 pointer-events-none opacity-40">
    <div class="absolute -top-48 -left-48 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]"></div>
    <div class="absolute -bottom-48 -right-48 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]"></div>
  </div>

  <div class="w-full max-w-md relative z-10 animate-fade-in">
    <!-- Logo/Brand area -->
    <div class="text-center mb-10 cursor-pointer group" (click)="navigateHome()">
      <div class="inline-block bg-white p-3 rounded-2xl shadow-xl border border-outline-variant/10 mb-6 group-hover:-translate-y-1 transition-transform">
        <img src="logo.jpg" alt="P41 Logo" class="h-12 w-auto">
      </div>
      <h1 class="text-3xl font-black tracking-tight text-on-surface">Admin <span class="text-primary">Dashboard</span></h1>
      <p class="text-on-surface-variant font-label text-sm mt-2">Industrial Excellence & Intelligence</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-3xl shadow-[0_20px_50px_rgba(33,85,157,0.1)] border border-outline-variant/5 overflow-hidden">
      <div class="p-8 md:p-10">
        <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-6">
          <!-- Email -->
          <div class="space-y-2">
            <label for="email" class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant/70 ml-1">Email Address</label>
            <div class="relative group">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 group-focus-within:text-primary transition-colors">mail</span>
              <input type="email" id="email" name="email" [(ngModel)]="email" required #emailInput="ngModel"
                class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-2xl text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all outline-none"
                placeholder="ives@p41.be">
            </div>
          </div>

          <!-- Password -->
          <div class="space-y-2">
            <label for="password" class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant/70 ml-1">Password</label>
            <div class="relative group">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 group-focus-within:text-primary transition-colors">lock</span>
              <input type="password" id="password" name="password" [(ngModel)]="password" required #passInput="ngModel"
                class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-2xl text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all outline-none"
                placeholder="••••••••">
            </div>
          </div>

          <!-- Error Alert -->
          <div *ngIf="error" class="bg-error/5 border border-error/10 text-error text-sm p-4 rounded-xl flex items-center gap-3 animate-slide-up">
            <span class="material-symbols-outlined text-lg">error</span>
            {{ error }}
          </div>

          <!-- Submit Button -->
          <button type="submit" [disabled]="loginForm.invalid || isLoading"
            class="w-full premium-gradient-btn !py-4 shadow-lg shadow-primary/20 relative flex items-center justify-center gap-2 overflow-hidden">
            <span *ngIf="!isLoading" class="font-bold">Sign In to Dashboard</span>
            <div *ngIf="isLoading" class="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            <span *ngIf="!isLoading" class="material-symbols-outlined text-xl">arrow_right_alt</span>
          </button>
        </form>
      </div>

      <!-- Footer Info -->
      <div class="bg-surface-container-low/50 px-8 py-4 border-t border-outline-variant/10 text-center">
        <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-widest font-bold">
          Authorized Personnel Only • IP Tracked
        </p>
      </div>
    </div>

    <!-- Back to site -->
    <div class="text-center mt-8">
      <a (click)="navigateHome()" class="text-on-surface-variant hover:text-primary transition-colors font-label text-sm cursor-pointer inline-flex items-center gap-2">
        <span class="material-symbols-outlined text-base">west</span>
        Return to Website
      </a>
    </div>
  </div>
</main>
